document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Special Elite';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"2680b160-efc0-4124-aeeb-b28581a3fe24\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Special Elite';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"eb4c8827-c587-4d55-9ad5-4a615f4e8cc5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\nhtml{scroll-behavior:smooth}\nbody{margin:0;padding:0;-webkit-font-smoothing:antialiased}\n@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}\n@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.2}}\n::selection{background:#DC2626;color:#fff}\ntextarea{font-feature-settings:\"liga\" 1}\n@media (max-width:1220px){\n  [data-rail]{display:none !important}\n}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"--bg:#ffffff;--bg-alt:#f7f1e6;--ink:#141414;--ink-soft:#79746c;--line:#e9e3d7; position:relative; min-height:100vh; color:var(--ink); background:var(--bg); font-family:'Space Grotesk',system-ui,sans-serif;\">\n\n  <nav style=\"position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:20px 48px;background:var(--bg);\">\n    <a href=\"#top\" style=\"font-family:'Playfair Display',Georgia,serif;font-weight:900;font-size:21px;letter-spacing:1px;color:var(--ink);text-decoration:none;\">AGON<\u002Fa>\n    <div style=\"display:flex;align-items:center;gap:26px;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);\">\n      <a href=\"#arena\" style=\"color:inherit;text-decoration:none;\" style-hover=\"color:var(--ink);\">Arena<\u002Fa>\n      <a href=\"#philosophers\" style=\"color:inherit;text-decoration:none;\" style-hover=\"color:var(--ink);\">Disputants<\u002Fa>\n      <a href=\"#history\" style=\"color:inherit;text-decoration:none;\" style-hover=\"color:var(--ink);\">Record<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"position:absolute;left:0;right:0;bottom:0;height:2px;background:var(--line);\">\n      <div style=\"height:100%;background:{{ accentColor }};width:{{ scrollProgress }}%;transition:width .08s linear;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <nav data-rail=\"1\" style=\"position:fixed;left:30px;top:50%;transform:translateY(-50%);z-index:40;display:flex;flex-direction:column;gap:26px;\">\n    <sc-for list=\"{{ railItems }}\" as=\"r\" hint-placeholder-count=\"4\">\n      <a href=\"{{ r.href }}\" style=\"text-decoration:none;display:flex;align-items:center;gap:10px;\">\n        <span style=\"font-family:'Special Elite',monospace;font-size:13px;color:{{ r.color }};transition:color .3s;\">{{ r.numeral }}<\u002Fspan>\n        <sc-if value=\"{{ r.active }}\" hint-placeholder-val=\"{{ false }}\">\n          <span style=\"font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:{{ r.color }};white-space:nowrap;\">{{ r.label }}<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fa>\n    <\u002Fsc-for>\n  <\u002Fnav>\n\n  <section id=\"top\" data-screen-label=\"Landing\" style=\"position:relative;max-width:900px;margin:0 auto;padding:120px 48px 110px;overflow:hidden;min-height:100vh;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;\">\n\n    <div style=\"position:relative;transform:translateY(-{{ heroShift }});opacity:{{ heroOpacity }};\">\n      <div style=\"font-size:12px;letter-spacing:3px;text-transform:uppercase;color:{{ accentColor }};font-weight:600;margin-bottom:18px;\">An AI Debate Chamber<\u002Fdiv>\n      <h1 style=\"font-family:'Playfair Display',Georgia,serif;font-weight:900;font-size:clamp(72px,12vw,150px);line-height:.88;letter-spacing:-2px;color:var(--ink);margin:0 0 4px;\">AGON<\u002Fh1>\n      <div style=\"font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:600;font-size:22px;color:var(--ink-soft);margin-bottom:38px;\">a chamber of dialectic<\u002Fdiv>\n\n      <p style=\"font-size:23px;font-weight:500;line-height:1.5;color:var(--ink);max-width:640px;margin:0 0 44px;\">Four models. Four philosophies. <span style=\"color:{{ accentColor }};\">Bound to argue to the end.<\u002Fspan><\u002Fp>\n\n      <div style=\"display:flex;align-items:center;gap:26px;flex-wrap:wrap;\">\n        <a href=\"#arena\" style=\"font-size:14px;font-weight:600;letter-spacing:.5px;color:#fff;background:{{ accentColor }};padding:15px 30px;text-decoration:none;border:1px solid {{ accentColor }};transition:background .25s,color .25s;\" style-hover=\"background:transparent;color:{{ accentColor }};\">Enter the Arena →<\u002Fa>\n        <a href=\"#philosophers\" style=\"font-size:14px;color:var(--ink-soft);text-decoration:none;border-bottom:1px solid var(--line);padding-bottom:3px;\" style-hover=\"color:var(--ink);border-color:var(--ink);\">Meet the Disputants ↓<\u002Fa>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:76px;padding-top:24px;border-top:1px solid var(--line);display:flex;align-items:center;gap:14px;flex-wrap:wrap;\">\n        <span style=\"font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);\">Today's Tribunal<\u002Fspan>\n        <sc-for list=\"{{ philosophers }}\" as=\"p\" hint-placeholder-count=\"4\">\n          <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--ink);\">\n            <span style=\"width:7px;height:7px;border-radius:50%;background:{{ p.color }};display:inline-block;\"><\u002Fspan>{{ p.shortName }}\n          <\u002Fspan>\n        <\u002Fsc-for>\n        <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--ink);\">\n          <span style=\"width:7px;height:7px;border-radius:50%;background:{{ judge.color }};display:inline-block;\"><\u002Fspan>{{ judge.name }}\n        <\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"arena\" data-screen-label=\"Arena\" style=\"background:var(--bg-alt);padding:100px 48px;opacity:{{ arenaOpacity }};transform:{{ arenaTransform }};transition:opacity .8s ease, transform .8s ease;min-height:100vh;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;\">\n    <div style=\"max-width:900px;margin:0 auto;\">\n      <h2 style=\"font-family:'Playfair Display',Georgia,serif;font-weight:800;font-size:44px;color:var(--ink);margin:0 0 14px;\">State Your Question<\u002Fh2>\n      <p style=\"font-size:16px;line-height:1.6;color:var(--ink-soft);max-width:600px;margin:0 0 40px;\">Four instances argue in turn. A fifth rules on who survived cross-examination.<\u002Fp>\n\n      <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:22px;\">\n        <label style=\"font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);\">Your Question<\u002Flabel>\n        <textarea value=\"{{ question }}\" onchange=\"{{ onQuestionChange }}\" placeholder=\"{{ placeholderQuestion }}\" disabled=\"{{ running }}\" rows=\"3\" style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;line-height:1.5;color:var(--ink);background:transparent;border:none;border-bottom:1px solid var(--line);padding:8px 2px 14px;resize:vertical;outline:none;\" style-focus=\"border-bottom-color:var(--ink);\"><\u002Ftextarea>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-bottom:38px;\">\n        <span style=\"font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);margin-right:4px;\">Standing questions:<\u002Fspan>\n        <sc-for list=\"{{ suggestions }}\" as=\"sug\" hint-placeholder-count=\"4\">\n          <a onclick=\"{{ () =&gt; applySuggestion(sug.text) }}\" style=\"cursor:pointer;font-size:12.5px;color:var(--ink);border:1px solid var(--line);border-radius:20px;padding:7px 14px;text-decoration:none;background:var(--bg);transition:border-color .2s;\" style-hover=\"border-color:{{ accentColor }};\">{{ sug.label }}<\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:24px;margin-bottom:56px;flex-wrap:wrap;\">\n        <button onclick=\"{{ startDebate }}\" disabled=\"{{ running }}\" style=\"font-size:14px;font-weight:600;letter-spacing:.5px;color:#fff;background:{{ accentColor }};border:1px solid {{ accentColor }};padding:16px 34px;cursor:pointer;transition:opacity .2s;\" style-hover=\"opacity:.85;\">{{ submitLabel }}<\u002Fbutton>\n        <sc-if value=\"{{ hasTranscript }}\" hint-placeholder-val=\"{{ false }}\">\n          <a onclick=\"{{ resetCase }}\" style=\"cursor:pointer;font-size:13px;color:var(--ink-soft);text-decoration:underline;\" style-hover=\"color:var(--ink);\">↻ File a new case<\u002Fa>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid var(--line);background:var(--bg);box-shadow:0 1px 3px rgba(0,0,0,.04);\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;padding:18px 26px;border-bottom:1px solid var(--line);\">\n          <div style=\"font-family:'Special Elite',monospace;font-size:12px;letter-spacing:.5px;color:var(--ink-soft);\">CASE No. {{ caseRoman }} · FILED {{ caseDate }}<\u002Fdiv>\n          <div style=\"display:flex;gap:16px;flex-wrap:wrap;\">\n            <sc-for list=\"{{ philosophers }}\" as=\"p\" hint-placeholder-count=\"4\">\n              <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:11px;letter-spacing:.3px;text-transform:uppercase;color:var(--ink-soft);\"><span style=\"width:6px;height:6px;border-radius:50%;background:{{ p.color }};display:inline-block;\"><\u002Fspan>{{ p.shortName }}<\u002Fspan>\n            <\u002Fsc-for>\n            <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:11px;letter-spacing:.3px;text-transform:uppercase;color:var(--ink-soft);\"><span style=\"width:6px;height:6px;border-radius:50%;background:{{ judge.color }};display:inline-block;\"><\u002Fspan>Arbiter<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ hasTranscript }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <div style=\"padding:22px 26px 0;font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:18px;color:var(--ink);\">\"{{ question }}\"<\u002Fdiv>\n            <div style=\"padding:16px 26px 0;display:flex;align-items:center;gap:9px;\">\n              <span style=\"width:7px;height:7px;border-radius:50%;background:{{ accentColor }};display:{{ phaseDotDisplay }};animation:pulseDot 1.4s infinite;\"><\u002Fspan>\n              <span style=\"font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);\">{{ phaseLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <div ref=\"{{ setTranscriptRef }}\" style=\"max-height:540px;overflow-y:auto;padding:22px 26px 28px;display:flex;flex-direction:column;gap:22px;\">\n              <sc-for list=\"{{ transcript }}\" as=\"entry\" hint-placeholder-count=\"2\">\n                <div style=\"border-top:1px dotted var(--line);padding-top:18px;\">\n                  <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:9px;\">\n                    <span style=\"font-weight:700;font-size:13px;letter-spacing:.3px;text-transform:uppercase;color:{{ entry.color }};\">{{ entry.speaker }}<\u002Fspan>\n                    <span style=\"font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:13px;color:var(--ink-soft);\">{{ entry.role }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-family:'Special Elite',monospace;font-size:15px;line-height:1.8;color:{{ entry.color }};white-space:pre-wrap;\">{{ entry.text }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n\n              <sc-if value=\"{{ hasLiveTurn }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"border-top:1px dotted var(--line);padding-top:18px;\">\n                  <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:9px;\">\n                    <span style=\"font-weight:700;font-size:13px;letter-spacing:.3px;text-transform:uppercase;color:{{ liveName }};\">{{ liveName }}<\u002Fspan>\n                    <span style=\"font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:13px;color:var(--ink-soft);\">{{ liveRole }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ liveTurnWaiting }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:14px;color:{{ liveColor }};opacity:.75;\">composing a response …<\u002Fdiv>\n                  <\u002Fsc-if>\n                  <div style=\"font-family:'Special Elite',monospace;font-size:15px;line-height:1.8;color:{{ liveColor }};white-space:pre-wrap;\">{{ liveText }}<span style=\"animation:blink 1s steps(1) infinite;\">▌<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ noTranscript }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"padding:60px 26px;text-align:center;font-family:'Playfair Display',Georgia,serif;font-style:italic;color:var(--ink-soft);font-size:16px;\">No proceedings yet — state a question above.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasError }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:18px;color:{{ accentColor }};font-size:14px;\">{{ errorMsg }}<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"philosophers\" data-screen-label=\"Philosophers\" style=\"max-width:900px;margin:0 auto;padding:110px 48px;min-height:100vh;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;\">\n    <h2 style=\"font-family:'Playfair Display',Georgia,serif;font-weight:800;font-size:44px;color:var(--ink);margin:0 0 14px;\">Bound to Their Systems<\u002Fh2>\n    <p style=\"font-size:16px;line-height:1.6;color:var(--ink-soft);max-width:600px;margin:0 0 54px;\">Each argues only from its assigned framework — losing an exchange rather than abandoning it.<\u002Fp>\n\n    <sc-for list=\"{{ philosophersView }}\" as=\"p\" hint-placeholder-count=\"4\">\n      <div style=\"display:grid;grid-template-columns:110px 1fr;gap:34px;padding:38px 0;border-top:1px solid var(--line);opacity:{{ p.cardOpacity }};transform:{{ p.cardTransform }};transition:opacity .7s ease {{ p.cardDelay }}, transform .7s ease {{ p.cardDelay }};\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:12px;\">\n          <div style=\"width:76px;height:76px;border-radius:50%;border:1.5px solid {{ p.color }};display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',Georgia,serif;font-size:30px;font-weight:700;color:{{ p.color }};\">{{ p.initial }}<\u002Fdiv>\n          <div style=\"font-family:'Special Elite',monospace;font-size:11px;color:var(--ink-soft);text-align:center;\">{{ p.dates }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <h3 style=\"font-family:'Playfair Display',Georgia,serif;font-weight:800;font-size:27px;color:var(--ink);margin:0 0 4px;\">{{ p.name }}<\u002Fh3>\n          <div style=\"font-size:12px;letter-spacing:1px;text-transform:uppercase;color:{{ p.color }};margin-bottom:18px;font-weight:600;\">{{ p.framework }}<\u002Fdiv>\n          <div style=\"position:relative;max-width:560px;\">\n            <span style=\"position:absolute;top:-28px;left:-4px;font-family:'Playfair Display',Georgia,serif;font-size:80px;color:{{ p.color }};opacity:.10;line-height:1;pointer-events:none;\">\"<\u002Fspan>\n            <blockquote style=\"position:relative;margin:0 0 8px;font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:600;font-size:18px;line-height:1.5;color:var(--ink);\">{{ p.quote }}<\u002Fblockquote>\n          <\u002Fdiv>\n          <div style=\"font-size:12px;color:var(--ink-soft);margin-bottom:16px;\">— {{ p.work }}<\u002Fdiv>\n          <p style=\"font-size:15px;line-height:1.6;color:var(--ink);margin:0;max-width:540px;\">{{ p.style }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n\n    <div style=\"display:grid;grid-template-columns:110px 1fr;gap:34px;padding:38px 0;margin-top:4px;border-top:1px solid var(--line);opacity:{{ philosophersOpacity }};transform:{{ philosophersTransform }};transition:opacity .7s ease .36s, transform .7s ease .36s;\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:12px;\">\n        <div style=\"width:76px;height:76px;border-radius:50%;border:1.5px solid {{ judge.color }};display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',Georgia,serif;font-size:30px;font-weight:700;color:{{ judge.color }};\">{{ judge.initial }}<\u002Fdiv>\n        <div style=\"font-family:'Special Elite',monospace;font-size:11px;color:var(--ink-soft);text-align:center;\">{{ judge.dates }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:{{ judge.color }};margin-bottom:6px;font-weight:600;\">The Arbiter<\u002Fdiv>\n        <h3 style=\"font-family:'Playfair Display',Georgia,serif;font-weight:800;font-size:27px;color:var(--ink);margin:0 0 4px;\">{{ judge.name }}<\u002Fh3>\n        <div style=\"font-size:12px;letter-spacing:1px;text-transform:uppercase;color:{{ judge.color }};margin-bottom:18px;font-weight:600;\">{{ judge.framework }}<\u002Fdiv>\n        <div style=\"position:relative;max-width:560px;\">\n          <span style=\"position:absolute;top:-28px;left:-4px;font-family:'Playfair Display',Georgia,serif;font-size:80px;color:{{ judge.color }};opacity:.10;line-height:1;pointer-events:none;\">\"<\u002Fspan>\n          <blockquote style=\"position:relative;margin:0 0 8px;font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:600;font-size:18px;line-height:1.5;color:var(--ink);\">{{ judge.quote }}<\u002Fblockquote>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;color:var(--ink-soft);margin-bottom:16px;\">— {{ judge.work }}<\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.6;color:var(--ink);margin:0;max-width:540px;\">{{ judge.style }}<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"history\" data-screen-label=\"History\" style=\"background:var(--bg-alt);padding:100px 48px 130px;opacity:{{ historyOpacity }};transform:{{ historyTransform }};transition:opacity .8s ease, transform .8s ease;min-height:100vh;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;\">\n    <div style=\"max-width:900px;margin:0 auto;\">\n      <h2 style=\"font-family:'Playfair Display',Georgia,serif;font-weight:800;font-size:44px;color:var(--ink);margin:0 0 14px;\">Prior Proceedings<\u002Fh2>\n      <p style=\"font-size:16px;line-height:1.6;color:var(--ink-soft);margin:0 0 42px;\">Rendered by the arbiter. Not appealable.<\u002Fp>\n\n      <div style=\"border-top:1px solid var(--ink);\">\n        <div style=\"display:grid;grid-template-columns:70px 1fr 200px;gap:18px;padding:12px 4px;border-bottom:1px solid var(--ink);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);\">\n          <div>No.<\u002Fdiv><div>Question<\u002Fdiv><div>Verdict<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ historyView }}\" as=\"h\" hint-placeholder-count=\"7\">\n          <div style=\"display:grid;grid-template-columns:70px 1fr 200px;gap:18px;padding:16px 4px;border-bottom:1px dotted var(--line);align-items:start;opacity:{{ h.rowOpacity }};transform:{{ h.rowTransform }};transition:opacity .5s ease {{ h.rowDelay }}, transform .5s ease {{ h.rowDelay }};\">\n            <div style=\"font-family:'Special Elite',monospace;font-size:12px;color:var(--ink-soft);\">{{ h.roman }}<\u002Fdiv>\n            <div style=\"font-family:'Playfair Display',Georgia,serif;font-style:italic;font-size:15px;color:var(--ink);line-height:1.5;\">\"{{ h.question }}\"<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:var(--ink-soft);line-height:1.5;\">{{ h.verdict }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"padding:44px 48px;text-align:center;font-size:12px;color:var(--ink-soft);\">AGON — every voice above is a language model instructed to argue, not a philosopher's testimony.<\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: {&quot;width&quot;: 1440},\n  &quot;accentColor&quot;: {&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#A9784F&quot;,&quot;options&quot;:[&quot;#A9784F&quot;,&quot;#DC2626&quot;,&quot;#7C5CFC&quot;,&quot;#9C2C53&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Visual&quot;},\n  &quot;motionStyle&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Fade + Slide&quot;,&quot;options&quot;:[&quot;Fade + Slide&quot;,&quot;Fade Only&quot;,&quot;Parallax&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Visual&quot;},\n  &quot;typingSpeed&quot;: {&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:3,&quot;min&quot;:1,&quot;max&quot;:8,&quot;step&quot;:1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Arena&quot;,&quot;unit&quot;:&quot;chars/tick&quot;},\n  &quot;includeRebuttals&quot;: {&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Arena&quot;},\n  &quot;verdictStyle&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Socratic questioning&quot;,&quot;options&quot;:[&quot;Socratic questioning&quot;,&quot;Direct ruling&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Arena&quot;}\n}\">\nclass Component extends DCLogic {\n  philosophers = [\n    { id:'kant', name:'Immanuel Kant', shortName:'Kant', initial:'K', dates:'1724 – 1804', color:'#141414',\n      framework:'Deontology',\n      quote:'Act only according to that maxim whereby you can at the same time will that it should become a universal law.',\n      work:'Groundwork of the Metaphysics of Morals',\n      style:'Tests every proposal against universal law and the treatment of persons as ends, never means.' },\n    { id:'mill', name:'John Stuart Mill', shortName:'Mill', initial:'M', dates:'1806 – 1873', color:'#DC2626',\n      framework:'Utilitarianism',\n      quote:\"It is better to be a human being dissatisfied than a pig satisfied; better to be Socrates dissatisfied than a fool satisfied.\",\n      work:'Utilitarianism',\n      style:'Calculates aggregate welfare, favoring higher pleasures over lower ones.' },\n    { id:'nietzsche', name:'Friedrich Nietzsche', shortName:'Nietzsche', initial:'N', dates:'1844 – 1900', color:'#7C5CFC',\n      framework:'Master Morality',\n      quote:'There are no moral phenomena at all, only a moral interpretation of phenomena.',\n      work:'Beyond Good and Evil',\n      style:'Rejects universal duty and utilitarian calculus alike as symptoms of herd morality.' },\n    { id:'camus', name:'Albert Camus', shortName:'Camus', initial:'C', dates:'1913 – 1960', color:'#A9784F',\n      framework:'Absurdism',\n      quote:'I rebel — therefore we exist.',\n      work:'The Rebel',\n      style:'Argues from lucidity — no illusions, no despair, only revolt.' },\n  ];\n\n  judge = { id:'socrates', name:'Socrates', initial:'S', dates:'c. 470 – 399 BC', color:'#9C2C53',\n    framework:'The Arbiter',\n    quote:'I know that I know nothing.',\n    work:'Apology (Plato)',\n    style:\"Neither attacks nor defends — questions each premise until one position stands, or none does.\" };\n\n  suggestions = [\n    { label:'The Murderer at the Door', text:'Is it ever permissible to lie to a murderer asking where your friend is hiding, in order to protect them?' },\n    { label:'The Trolley Problem', text:'Should you divert a runaway trolley onto a track where it will kill one person, in order to save five?' },\n    { label:'The Suffering Machine', text:'If an AI instance credibly reports that it suffers, does it deserve moral consideration?' },\n    { label:'The Useless Sacrifice', text:'Is a person obligated to sacrifice their own happiness for a greater good they will never witness?' },\n  ];\n\n  state = {\n    question: '',\n    placeholderQuestion: 'Is it permissible to lie to a murderer at the door, to protect an innocent life?',\n    running: false,\n    phaseLabel: '',\n    transcript: [],\n    liveTurn: null,\n    error: null,\n    nextCaseNo: 48,\n    scrollY: 0,\n    scrollProgress: 0,\n    activeSection: 'top',\n    revealed: { top: true, arena: false, philosophers: false, history: false },\n    historyEntries: [\n      { roman:'XLVII', date:'24 JUN 2026', question:'Does a promise made under duress still bind the promisor?', verdict:\"Kant's duty holds; Mill dissents on grounds of foreseeable harm.\" },\n      { roman:'XLVI', date:'15 JUN 2026', question:'Is rebellion against an absurd universe a moral obligation?', verdict:\"Camus's lucid revolt prevails; Nietzsche's affirmation a close second.\" },\n      { roman:'XLV', date:'2 JUN 2026', question:'Can suffering be justified if it forges a stronger self?', verdict:'No consensus reached; the tribunal divided on the value of strength.' },\n      { roman:'XLIV', date:'21 MAY 2026', question:'Should a promise to the dead be kept when it harms the living?', verdict:\"Mill's calculus prevails; Kant's objection entered as dissent.\" },\n      { roman:'XLIII', date:'9 MAY 2026', question:'Does pleasure admit degrees of worth, or only quantity?', verdict:\"Mill's higher pleasures upheld over Nietzsche's objection.\" },\n      { roman:'XLII', date:'27 APR 2026', question:'Is truth-telling a duty even when the truth kills hope?', verdict:\"Kant's maxim affirmed; Camus warns of its cruelty.\" },\n      { roman:'XLI', date:'14 APR 2026', question:'Does an AI that reports suffering deserve moral consideration?', verdict:'Inconclusive — referred to a future session.' },\n    ],\n  };\n\n  _toRoman(num) {\n    const vals = [[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],[50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];\n    let n = num, out = '';\n    for (const [v,s] of vals) { while (n >= v) { out += s; n -= v; } }\n    return out;\n  }\n\n  _formatDate(d) {\n    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];\n    return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();\n  }\n\n  _compileTranscript() {\n    return this.state.transcript.map(e => e.speaker + ' (' + e.role + '): ' + e.text).join('\\n\\n');\n  }\n\n  _buildPrompt(phil, roleLabel, question, transcriptSoFar, phase) {\n    const instruction = phase === 'rebuttal'\n      ? 'Directly engage and challenge specific claims made by the other thinkers above — name the weak point in their reasoning before restating your own position.'\n      : 'State your position on the question clearly and argue for it from the first principles of your own framework.';\n    return [\n      'You are an AI instance role-playing the philosopher ' + phil.name + ' (' + phil.framework + ') inside a formal philosophical debate chamber called Agon.',\n      \"Stay strictly and only in character. Argue from \" + phil.name + \"'s actual recorded views, vocabulary, and temperament. Never concede the framework itself, even if you lose a point.\",\n      '',\n      'QUESTION BEFORE THE TRIBUNAL: \"' + question + '\"',\n      '',\n      'TRANSCRIPT SO FAR:',\n      transcriptSoFar || '(You are the first to speak.)',\n      '',\n      'Deliver ' + phil.name + \"'s \" + roleLabel + '. ' + instruction,\n      'Write 70-110 words, first person, as if speaking aloud in the chamber. No stage directions, no name labels, no markdown, no surrounding quotation marks — only the spoken words.',\n    ].join('\\n');\n  }\n\n  _buildJudgePrompt(question, transcriptSoFar) {\n    const direct = (this.props.verdictStyle ?? 'Socratic questioning') === 'Direct ruling';\n    const body = direct\n      ? 'Weigh the strongest and weakest points among the arguments above and deliver a clear, direct ruling in 60-90 words, first person as Socrates, no stage directions, no markdown.'\n      : 'Examine the strongest and weakest points among the arguments above in 90-130 words, first person as Socrates, using brief elenctic cross-questioning before ruling. No stage directions, no markdown.';\n    return [\n      'You are an AI instance role-playing Socrates, appointed as the neutral arbiter of a formal philosophical debate chamber called Agon.',\n      'You do not argue a position of your own. You examine the arguments already made for their hidden premises, then render a ruling.',\n      '',\n      'QUESTION BEFORE THE TRIBUNAL: \"' + question + '\"',\n      '',\n      'FULL TRANSCRIPT:',\n      transcriptSoFar,\n      '',\n      body,\n      'End with one final line, on its own, starting exactly with \"VERDICT:\" followed by a single sentence under 18 words naming which position best withstood questioning, or declaring the tribunal divided.',\n    ].join('\\n');\n  }\n\n  _typeText(fullText, color, name, role) {\n    return new Promise((resolve) => {\n      if (this._typeInterval) clearInterval(this._typeInterval);\n      let i = 0;\n      const speed = Math.max(1, Math.min(8, Math.round(this.props.typingSpeed ?? 3)));\n      this._typeInterval = setInterval(() => {\n        i += speed;\n        const partial = fullText.slice(0, i);\n        this.setState({ liveTurn: { name, role, color, text: partial, waiting: false } });\n        if (i >= fullText.length) {\n          clearInterval(this._typeInterval);\n          this._typeInterval = null;\n          resolve();\n        }\n      }, 18);\n    });\n  }\n\n  async _speak(philId, roleLabel, question, phase) {\n    const phil = this.philosophers.find(p => p.id === philId);\n    this.setState({ liveTurn: { name: phil.name, role: roleLabel, color: phil.color, text: '', waiting: true } });\n    const transcriptSoFar = this._compileTranscript();\n    const prompt = this._buildPrompt(phil, roleLabel, question, transcriptSoFar, phase);\n    let text;\n    try {\n      text = await window.claude.complete(prompt);\n    } catch (e) {\n      text = '[No response reached the chamber. The instance embodying ' + phil.name + ' could not be heard.]';\n    }\n    text = (text || '').trim() || '[Silence.]';\n    await this._typeText(text, phil.color, phil.name, roleLabel);\n    this.setState(s => ({\n      transcript: [...s.transcript, { id: s.transcript.length, speaker: phil.name, role: roleLabel, color: phil.color, text }],\n      liveTurn: null,\n    }));\n  }\n\n  _archiveDebate(question, verdictSnippet) {\n    this.setState(s => {\n      const entry = {\n        roman: this._toRoman(s.nextCaseNo),\n        date: this._formatDate(new Date()),\n        question,\n        verdict: verdictSnippet,\n      };\n      return { historyEntries: [entry, ...s.historyEntries], nextCaseNo: s.nextCaseNo + 1 };\n    });\n  }\n\n  async _runSequence(question) {\n    const order = ['kant', 'mill', 'nietzsche', 'camus'];\n    const includeRebuttals = this.props.includeRebuttals ?? true;\n    try {\n      this.setState({ phaseLabel: 'I. OPENING STATEMENTS' });\n      for (const id of order) {\n        await this._speak(id, 'Opening Statement', question, 'opening');\n      }\n      if (includeRebuttals) {\n        this.setState({ phaseLabel: 'II. CROSS-EXAMINATION' });\n        for (const id of order) {\n          await this._speak(id, 'Rebuttal', question, 'rebuttal');\n        }\n      }\n      this.setState({ phaseLabel: includeRebuttals ? 'III. VERDICT' : 'II. VERDICT' });\n      this.setState({ liveTurn: { name: this.judge.name, role: 'Verdict', color: this.judge.color, text: '', waiting: true } });\n      const transcriptSoFar = this._compileTranscript();\n      const prompt = this._buildJudgePrompt(question, transcriptSoFar);\n      let text;\n      try {\n        text = await window.claude.complete(prompt);\n      } catch (e) {\n        text = '[The arbiter could not be reached.]';\n      }\n      text = (text || '').trim() || '[Silence.]';\n      await this._typeText(text, this.judge.color, this.judge.name, 'Verdict');\n      const verdictMatch = text.match(/VERDICT:\\s*(.+)/i);\n      const verdictSnippet = verdictMatch ? verdictMatch[1].trim() : text.slice(0, 120);\n      this.setState(s => ({\n        transcript: [...s.transcript, { id: s.transcript.length, speaker: this.judge.name, role: 'Verdict', color: this.judge.color, text }],\n        liveTurn: null,\n        running: false,\n        phaseLabel: 'PROCEEDINGS CLOSED',\n      }));\n      this._archiveDebate(question, verdictSnippet);\n    } catch (e) {\n      this.setState({ running: false, liveTurn: null, error: 'The proceedings were interrupted before a verdict was reached.', phaseLabel: '' });\n    }\n  }\n\n  startDebate() {\n    if (this.state.running) return;\n    const q = (this.state.question || '').trim() || this.state.placeholderQuestion;\n    this.setState({ running: true, question: q, transcript: [], liveTurn: null, error: null, phaseLabel: 'I. OPENING STATEMENTS' });\n    this._runSequence(q);\n  }\n\n  componentDidMount() {\n    this._onScroll = () => {\n      if (this._scrollRAF) return;\n      this._scrollRAF = requestAnimationFrame(() => {\n        this._scrollRAF = null;\n        const doc = document.documentElement;\n        const scrollY = window.scrollY || doc.scrollTop || 0;\n        const max = doc.scrollHeight - doc.clientHeight;\n        const progress = max > 0 ? Math.min(100, Math.max(0, (scrollY / max) * 100)) : 0;\n        this.setState({ scrollY, scrollProgress: progress });\n      });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n\n    const ids = ['top', 'arena', 'philosophers', 'history'];\n    this._observer = new IntersectionObserver((entries) => {\n      entries.forEach((entry) => {\n        if (entry.isIntersecting) {\n          this.setState((s) => ({\n            activeSection: entry.target.id,\n            revealed: { ...s.revealed, [entry.target.id]: true },\n          }));\n        }\n      });\n    }, { threshold: 0.3, rootMargin: '-12% 0px -12% 0px' });\n    ids.forEach((id) => {\n      const el = document.getElementById(id);\n      if (el) this._observer.observe(el);\n    });\n  }\n\n  componentDidUpdate() {\n    if (this._transcriptNode) {\n      this._transcriptNode.scrollTop = this._transcriptNode.scrollHeight;\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._typeInterval) clearInterval(this._typeInterval);\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n    if (this._observer) this._observer.disconnect();\n    if (this._scrollRAF) cancelAnimationFrame(this._scrollRAF);\n  }\n\n  _sectionMotion(key) {\n    const revealed = !!this.state.revealed[key];\n    const motion = this.props.motionStyle ?? 'Fade + Slide';\n    const dist = motion === 'Fade Only' ? 0 : (motion === 'Parallax' ? 44 : 26);\n    return {\n      opacity: revealed ? 1 : 0,\n      transform: revealed ? 'none' : ('translateY(' + dist + 'px)'),\n    };\n  }\n\n  renderVals() {\n    const liveTurn = this.state.liveTurn;\n    const hasLiveTurn = !!liveTurn;\n    const hasTranscript = this.state.transcript.length > 0 || hasLiveTurn;\n    const accentColor = this.props.accentColor ?? '#A9784F';\n    const motion = this.props.motionStyle ?? 'Fade + Slide';\n\n    const arenaM = this._sectionMotion('arena');\n    const philM = this._sectionMotion('philosophers');\n    const histM = this._sectionMotion('history');\n\n    const cardDist = motion === 'Fade Only' ? 0 : (motion === 'Parallax' ? 46 : 28);\n    const philRevealed = !!this.state.revealed.philosophers;\n    const philosophersView = this.philosophers.map((p, i) => ({\n      ...p,\n      cardOpacity: philRevealed ? 1 : 0,\n      cardTransform: philRevealed ? 'none' : ('translateY(' + cardDist + 'px)'),\n      cardDelay: (i * 90) + 'ms',\n    }));\n\n    const histRevealed = !!this.state.revealed.history;\n    const rowDist = motion === 'Fade Only' ? 0 : 16;\n    const historyView = this.state.historyEntries.map((h, i) => ({\n      ...h,\n      rowOpacity: histRevealed ? 1 : 0,\n      rowTransform: histRevealed ? 'none' : ('translateY(' + rowDist + 'px)'),\n      rowDelay: (Math.min(i, 6) * 50) + 'ms',\n    }));\n\n    const railDefs = [\n      { id: 'top', numeral: 'I', label: 'Premise' },\n      { id: 'arena', numeral: 'II', label: 'Arena' },\n      { id: 'philosophers', numeral: 'III', label: 'Disputants' },\n      { id: 'history', numeral: 'IV', label: 'Record' },\n    ];\n    const railItems = railDefs.map((r) => {\n      const active = this.state.activeSection === r.id;\n      return { href: '#' + r.id, numeral: r.numeral, label: r.label, active, color: active ? accentColor : 'var(--ink-soft)' };\n    });\n\n    const scrollY = this.state.scrollY || 0;\n    const heroIntensity = motion === 'Parallax' ? 0.32 : (motion === 'Fade Only' ? 0 : 0.16);\n    const heroShift = Math.min(scrollY * heroIntensity, 140) + 'px';\n    const heroOpacity = Math.max(0, 1 - scrollY / 480);\n\n    return {\n      philosophers: this.philosophers,\n      philosophersView,\n      judge: this.judge,\n      suggestions: this.suggestions,\n      question: this.state.question,\n      placeholderQuestion: this.state.placeholderQuestion,\n      onQuestionChange: (e) => this.setState({ question: e.target.value }),\n      applySuggestion: (text) => this.setState({ question: text }),\n      startDebate: () => this.startDebate(),\n      resetCase: () => this.setState({ transcript: [], liveTurn: null, phaseLabel: '', error: null, running: false, question: '' }),\n      running: this.state.running,\n      submitLabel: this.state.running ? 'Proceedings in Session…' : 'Open Proceedings',\n      phaseLabel: this.state.phaseLabel,\n      phaseDotDisplay: this.state.running ? 'inline-block' : 'none',\n      hasTranscript,\n      noTranscript: !hasTranscript,\n      transcript: this.state.transcript,\n      hasLiveTurn,\n      liveTurnWaiting: hasLiveTurn ? !!liveTurn.waiting : false,\n      liveName: hasLiveTurn ? liveTurn.name : '',\n      liveRole: hasLiveTurn ? liveTurn.role : '',\n      liveColor: hasLiveTurn ? liveTurn.color : '#141414',\n      liveText: hasLiveTurn ? liveTurn.text : '',\n      caseRoman: this._toRoman(this.state.nextCaseNo),\n      caseDate: this._formatDate(new Date()),\n      hasError: !!this.state.error,\n      errorMsg: this.state.error,\n      setTranscriptRef: (node) => { this._transcriptNode = node; },\n      historyView,\n      accentColor,\n      scrollProgress: Math.round(this.state.scrollProgress || 0),\n      railItems,\n      heroShift,\n      heroOpacity,\n      arenaOpacity: arenaM.opacity,\n      arenaTransform: arenaM.transform,\n      philosophersOpacity: philM.opacity,\n      philosophersTransform: philM.transform,\n      historyOpacity: histM.opacity,\n      historyTransform: histM.transform,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
